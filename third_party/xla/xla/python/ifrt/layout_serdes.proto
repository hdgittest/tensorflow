syntax = "proto3";

package xla.ifrt;

import "xla/python/ifrt/dtype.proto";
import "xla/python/ifrt/shape.proto";

// Proto equivalent of C++ `DefaultLayout`.
message DefaultLayoutProto {
  DTypeProto dtype = 1;
  ShapeProto shard_shape = 2;
  int32 device_id = 3;
  optional string memory_kind = 4;
}

// Proto equivalent of C++ `ByteStridesLayout`.
message ByteStridesLayoutProto {
  repeated int64 byte_strides = 1;
}
